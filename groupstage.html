let SCORES = {}; // keyed by "T1|T2" canonical match key → { s1, s2, status, clock }
let liveRefreshTimer = null;

// Canonical key matching MATCHES array order — used to look up scores
function matchKey(m) { return m.t1 + '|' + m.t2; }

// ESPN name aliases: some ESPN team names differ from ours
const ESPN_NAME = {
  "Cote d'Ivoire": "Ivory Coast",
  "Bosnia & Herz.": "Bosnia-Herzegovina",
  "Cabo Verde": "Cape Verde",
  "DR Congo": "Congo DR",
  "Turkey": "Türkiye",
  "USA": "United States",
};
function espnName(t) { return ESPN_NAME[t] || t; }

async function fetchScores() {
  try {
    const url = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260627&limit=200';
    const res = await fetch(url);
    if (!res.ok) return;
    const data = await res.json();
    const events = data.events || [];

    const newScores = {};
    events.forEach(ev => {
      const comp = ev.competitions?.[0];
      if (!comp) return;
      const teams = comp.competitors || [];
      if (teams.length < 2) return;

      // ESPN returns home/away; find by order index (0=home, 1=away) or by homeAway field
      const home = teams.find(t => t.homeAway === 'home') || teams[0];
      const away = teams.find(t => t.homeAway === 'away') || teams[1];
      const homeName = home.team?.displayName || home.team?.name || '';
      const awayName = away.team?.displayName || away.team?.name || '';

      const statusType  = ev.status?.type?.name  || 'STATUS_SCHEDULED';
      const statusState = ev.status?.type?.state || '';
      const rawClock = ev.status?.displayClock || '';
      const period = ev.status?.period || 0;

      let status = 'pre';
      if (statusState === 'post') status = 'ft';
      else if (statusState === 'in') status = 'live';

      // Build a football-correct clock string
      let clockDisplay = '';
      if (status === 'live') {
        if (statusType === 'STATUS_HALFTIME') {
          clockDisplay = 'HT';
        } else {
          // rawClock is typically "42:00" — extract the minute portion
          const mins = parseInt(rawClock.split(':')[0], 10) || 0;
          const regularMax = period === 1 ? 45 : 90;
          if (mins > regularMax) {
            clockDisplay = regularMax + '+' + (mins - regularMax) + "'";
          } else {
            clockDisplay = mins + "'";
          }
        }
      }

      const s1 = parseInt(home.score ?? '0', 10);
      const s2 = parseInt(away.score ?? '0', 10);

      const hw = home.winner === true, aw = away.winner === true;
      // Match against our MATCHES array
      MATCHES.forEach(m => {
        const e1 = espnName(m.t1), e2 = espnName(m.t2);
        if (
          (homeName.includes(e1) || e1.includes(homeName)) &&
          (awayName.includes(e2) || e2.includes(awayName))
        ) {
          newScores[matchKey(m)] = { s1, s2, status, clock: clockDisplay, w1: hw, w2: aw };
        } else if (
          (homeName.includes(e2) || e2.includes(homeName)) &&
          (awayName.includes(e1) || e1.includes(awayName))
        ) {
          // ESPN has them reversed
          newScores[matchKey(m)] = { s1: s2, s2: s1, status, clock: clockDisplay, w1: aw, w2: hw };
        }
      });
    });

    SCORES = newScores;
    renderSchedule();

    // If any match is live, refresh every 60s; otherwise clear the timer
    const hasLive = Object.values(SCORES).some(s => s.status === 'live');
    clearTimeout(liveRefreshTimer);
    if (hasLive) {
      liveRefreshTimer = setTimeout(fetchScores, 60000);
    }
  } catch (e) {
    // Silently fail — scores just won't show
  }
}

function getTz() {
  return document.getElementById('tzSelect').value;
}

function getEffectiveTz(match) {
  const tz = getTz();
  if (tz === 'local') return VENUE_TZ[match.venue] || 'America/New_York';
  return tz;
}

function getLocalDateKey(ms, tz) {
  return new Date(ms).toLocaleDateString('en-AU', { timeZone: tz, year:'numeric', month:'2-digit', day:'2-digit' });
}

function getLocalDateLabel(ms, tz) {
  return new Date(ms).toLocaleDateString('en-AU', {
    timeZone: tz, weekday:'long', day:'numeric', month:'long', year:'numeric'
  });
}

function getTimeStr(ms, tz) {
  return new Date(ms).toLocaleTimeString('en-AU', { timeZone: tz, hour:'numeric', minute:'2-digit', hour12:true });
}

function matchPassesFilters(m) {
  if (currentGroup !== 'all' && m.group !== currentGroup) return false;
  if (selectedPeople.size > 0) {
    const p1 = PEOPLE[m.t1], p2 = PEOPLE[m.t2];
    if (!selectedPeople.has(p1) && !selectedPeople.has(p2)) return false;
  }
  return true;
}

function formatCountdown(ms) {
  const diff = ms - Date.now();
  if (diff <= 0) return 'Starting now';
  const totalMins = Math.floor(diff / 60000);
  const days  = Math.floor(totalMins / 1440);
  const hours = Math.floor((totalMins % 1440) / 60);
  const mins  = totalMins % 60;
  const parts = [];
  if (days)  parts.push(days  + (days  === 1 ? ' day'    : ' days'));
  if (hours) parts.push(hours + (hours === 1 ? ' hour'   : ' hours'));
  if (mins || parts.length === 0) parts.push(mins + (mins === 1 ? ' minute' : ' minutes'));
  return 'Begins in ' + parts.join(' ');
}

function tickCountdowns() {
  document.querySelectorAll('.match-card-countdown[data-ms]').forEach(el => {
    el.textContent = formatCountdown(parseInt(el.dataset.ms, 10));
  });
}

setInterval(tickCountdowns, 30000);

function renderSchedule() {
  const schedule = document.getElementById('schedule');
  const filtered = MATCHES.filter(matchPassesFilters);

  // For "local" tz mode, we can't group by a single tz — use ET as the grouping key for ordering,
  // but display each match in its own venue tz.
  // For fixed tz, group by that tz's local date.
  const tzForGrouping = getTz() === 'local' ? 'America/New_York' : getTz();

  const byDay = {};
  const dayOrder = [];
  filtered.forEach(m => {
    const key = getLocalDateKey(m.ms, tzForGrouping);
    if (!byDay[key]) { byDay[key] = []; dayOrder.push(key); }
    byDay[key].push(m);
  });

  const seen = new Set();
  const uniqDays = dayOrder.filter(d => { if(seen.has(d)) return false; seen.add(d); return true; });

  let html = '';
  uniqDays.forEach(dayKey => {
    const matches = byDay[dayKey];
    // Use first match's ms and the grouping tz for the day label
    const label = getLocalDateLabel(matches[0].ms, tzForGrouping);
    html += `<div class="day-block" data-ms="${matches[0].ms}"><div class="day-header">${label}</div><div class="matches-grid">`;

    matches.forEach(m => {
      const tz = getEffectiveTz(m);
      const timeStr = getTimeStr(m.ms, tz);
      const p1 = PEOPLE[m.t1] || '';
      const p2 = PEOPLE[m.t2] || '';
      const p1hl = selectedPeople.size > 0 && selectedPeople.has(p1);
      const p2hl = selectedPeople.size > 0 && selectedPeople.has(p2);
      const sc = SCORES[matchKey(m)];
      const cardHl = p1hl || p2hl ? ' person-highlight' : '';
      const venueLabel = getTz() === 'local' ? `${m.venue} (local)` : m.venue;

      let metaHtml, topHtml = '', bottomHtml = '', s1Html = '', s2Html = '';
      if (sc && (sc.status === 'live' || sc.status === 'ft')) {
        const isLive = sc.status === 'live';
        let pillLabel;
        if (!isLive) {
          pillLabel = 'Match Finished';
        } else if (!sc.clock || sc.clock === 'HT') {
          pillLabel = sc.clock === 'HT' ? 'Half Time' : 'Live';
        } else {
          pillLabel = `Live · ${sc.clock}`;
        }
        const statusClass = isLive ? 'live' : 'ft';
        topHtml = `<div class="match-card-status"><span class="match-status-pill ${statusClass}">${pillLabel}</span></div>`;
        s1Html = `<span class="score-num">${sc.s1}</span>`;
        s2Html = `<span class="score-num">${sc.s2}</span>`;
        metaHtml = `<div class="match-venue">${venueLabel}</div>`;
      } else {
        bottomHtml = `<div class="match-card-countdown countdown" data-ms="${m.ms}">${formatCountdown(m.ms)}</div>`;
        metaHtml = `
            <div class="match-time">${timeStr}</div>
            <div class="match-venue">${venueLabel}</div>`;
      }

      html += `
        <div class="match-card${cardHl}" data-group="${m.group}">
          ${topHtml}
          <span class="match-group-badge badge-${m.group.toLowerCase()}">GRP ${m.group}</span>
          <div class="match-teams">
            <div class="team-row-m${sc && sc.status === 'ft' && sc.w2 && !sc.w1 ? ' loser' : ''}">
              <span class="team-flag">${FLAGS[m.t1]||'🏳'}</span>
              <span class="team-name">${m.t1}</span>
              <span class="team-person${p1hl?' highlighted':''}">${p1}</span>
              ${s1Html}
            </div>
            <div class="vs-divider">vs</div>
            <div class="team-row-m${sc && sc.status === 'ft' && sc.w1 && !sc.w2 ? ' loser' : ''}">
              <span class="team-flag">${FLAGS[m.t2]||'🏳'}</span>
              <span class="team-name">${m.t2}</span>
              <span class="team-person${p2hl?' highlighted':''}">${p2}</span>
              ${s2Html}
            </div>
          </div>
          <div class="match-meta">${metaHtml}
          </div>
          ${bottomHtml}
        </div>`;
    });
    html += `</div></div>`;
  });

  schedule.innerHTML = html;
  document.getElementById('noMatches').style.display = filtered.length === 0 ? 'block' : 'none';
}

function updateGroupChip() {
  const container = document.getElementById('groupActiveChips');
  while (container.firstChild) container.removeChild(container.firstChild);
  if (currentGroup !== 'all') {
    const chip = document.createElement('button');
    chip.style.cssText = 'padding:5px 12px;border-radius:20px;border:1px solid #111;background:#333;color:#fff;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;';
    chip.textContent = 'Group ' + currentGroup + ' ✕';
    chip.addEventListener('click', () => {
      currentGroup = 'all';
      document.querySelectorAll('#groupFilter button').forEach(b => b.classList.remove('active'));
      document.querySelector('#groupFilter button[data-group="all"]').classList.add('active');
      updateGroupChip();
      renderSchedule();
    });
    container.appendChild(chip);
  }
}

function filterGroup(btn) {
  document.querySelectorAll('#groupFilter button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentGroup = btn.dataset.group;
  updateGroupChip();
  document.getElementById('groupFilterPanel').classList.remove('open');
  document.getElementById('groupFilterToggle').classList.remove('open');
  renderSchedule();
}

function toggleGroupFilter() {
  const panel = document.getElementById('groupFilterPanel');
  const toggle = document.getElementById('groupFilterToggle');
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  toggle.classList.toggle('open', !isOpen);
}

function togglePersonFilter() {
  const panel = document.getElementById('personFilterPanel');
  const toggle = document.getElementById('personFilterToggle');
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  toggle.classList.toggle('open', !isOpen);
}

function collapsePersonFilter() {
  document.getElementById('personFilterPanel').classList.remove('open');
  document.getElementById('personFilterToggle').classList.remove('open');
}

function updateActiveChips() {
  const container = document.getElementById('personActiveChips');
  while (container.firstChild) container.removeChild(container.firstChild);
  selectedPeople.forEach(person => {
    const sourceBtn = document.querySelector('#personFilter button[data-person="' + person + '"]');
    const label = sourceBtn ? sourceBtn.textContent : person;
    const chip = document.createElement('button');
    chip.className = 'active';
    chip.style.cssText = 'padding:5px 12px;border-radius:20px;border:1px solid #111;background:#333;color:#fff;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;';
    chip.textContent = label + ' ✕';
    chip.addEventListener('click', () => removePerson(person));
    container.appendChild(chip);
  });
}

function removePerson(person) {
  selectedPeople.delete(person);
  const btn = document.querySelector('#personFilter button[data-person="' + person + '"]');
  if (btn) btn.classList.remove('active');
  if (selectedPeople.size === 0) {
    document.querySelector('#personFilter button[data-person="all"]').classList.add('active');
  }
  updateActiveChips();
  renderSchedule();
}

function filterPerson(btn) {
  const person = btn.dataset.person;

  if (person === 'all') {
    selectedPeople.clear();
    document.querySelectorAll('#personFilter button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateActiveChips();
    collapsePersonFilter();
  } else {
    document.querySelector('#personFilter button[data-person="all"]').classList.remove('active');

    if (selectedPeople.has(person)) {
      selectedPeople.delete(person);
      btn.classList.remove('active');
    } else {
      selectedPeople.add(person);
      btn.classList.add('active');
    }

    if (selectedPeople.size === 0) {
      document.querySelector('#personFilter button[data-person="all"]').classList.add('active');
    }

    updateActiveChips();
    collapsePersonFilter();
  }

  renderSchedule();
}

const savedTz = localStorage.getItem('wc26tz');
if (savedTz) { const sel = document.getElementById('tzSelect'); if ([...sel.options].some(o => o.value === savedTz)) sel.value = savedTz; }
function scrollToUpcoming() {
  const now = Date.now();
  const blocks = document.querySelectorAll('.day-block[data-ms]');
  let target = null;
  for (const block of blocks) {
    const ms = parseInt(block.dataset.ms, 10);
    if (ms > now || block.querySelector('.match-card-countdown')) {
      target = block;
      break;
    }
  }
  if (!target) target = blocks[blocks.length - 1];
  if (!target) return;
  // Measure all sticky elements so we don't scroll under them
  const stickyOffset = Array.from(document.querySelectorAll('header, .subheader'))
    .reduce((sum, el) => sum + el.offsetHeight, 0);
  const top = target.getBoundingClientRect().top + window.scrollY - stickyOffset - 12;
  window.scrollTo({ top, behavior: 'smooth' });
}

renderSchedule();
fetchScores();
</script>
</body>
</html>
