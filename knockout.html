// ESPN name → our name (for PEOPLE/FLAGS lookup after ESPN resolves team names)
const ESPN_TO_OURS = {
  "Ivory Coast":          "Cote d'Ivoire",
  "Bosnia-Herzegovina":   "Bosnia & Herz.",
  "Cape Verde":           "Cabo Verde",

};
function ourName(espnDisplayName) { return ESPN_TO_OURS[espnDisplayName] || espnDisplayName; }

// Placeholder team name patterns ESPN uses before a slot is confirmed
function isPlaceholder(name) {
  return !name || name === 'TBD' ||
    /^(Group|Round of|Quarterfinal|Semifinal|Third Place)/i.test(name);
}

let SCORES    = {};  // espnId → { t1, t2, s1, s2, status, clock }
let ELIM_SET  = new Set(); // set of our team names confirmed eliminated
let liveRefreshTimer = null;

async function fetchStandings() {
  try {
    const res = await fetch('https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings');
    if (!res.ok) return;
    const data = await res.json();
    const newElim = new Set();
    (data.children || []).forEach(group => {
      (group.standings?.entries || []).forEach(entry => {
        const espnTeam = entry.team?.displayName || '';
        const note = entry.note?.description || '';
        if (note === 'Eliminated') newElim.add(ourName(espnTeam));
      });
    });
    ELIM_SET = newElim;
    applyEliminatedStyling();
  } catch (e) {}
}

function applyEliminatedStyling() {
  document.querySelectorAll('#personFilter button[data-person]').forEach(btn => {
    const person = btn.dataset.person;
    if (person === 'all') return;
    // Find which team this person supports
    const team = Object.keys(PEOPLE).find(t => PEOPLE[t] === person);
    const isElim = team && ELIM_SET.has(team);
    btn.classList.toggle('eliminated', isElim);
  });
}

async function fetchScores() {
  try {
    const url = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260628-20260719&limit=100';
    const res = await fetch(url);
    if (!res.ok) return;
    const data = await res.json();
    const newScores = {};

    (data.events || []).forEach(ev => {
      const comp = ev.competitions?.[0];
      if (!comp) return;
      const teams = comp.competitors || [];
      if (teams.length < 2) return;

      const home = teams.find(t => t.homeAway === 'home') || teams[0];
      const away = teams.find(t => t.homeAway === 'away') || teams[1];
      const rawHome = home.team?.displayName || '';
      const rawAway = away.team?.displayName || '';

      // Resolve to our internal names (or keep placeholder if still TBD)
      const t1 = isPlaceholder(rawHome) ? null : ourName(rawHome);
      const t2 = isPlaceholder(rawAway) ? null : ourName(rawAway);

      const statusType = ev.status?.type?.name || 'STATUS_SCHEDULED';
      const rawClock   = ev.status?.displayClock || '';
      const period     = ev.status?.period || 0;

      let status = 'pre';
      if (statusType === 'STATUS_FINAL' || statusType === 'STATUS_FULL_TIME') status = 'ft';
      else if (statusType === 'STATUS_IN_PROGRESS' || statusType === 'STATUS_HALFTIME') status = 'live';

      let clockDisplay = '';
      if (status === 'live') {
        if (statusType === 'STATUS_HALFTIME') {
          clockDisplay = 'HT';
        } else {
          const mins = parseInt(rawClock.split(':')[0], 10) || 0;
          const regularMax = period === 1 ? 45 : 90;
          clockDisplay = mins > regularMax ? regularMax + '+' + (mins - regularMax) + "'" : mins + "'";
        }
      }

      const s1 = parseInt(home.score ?? '0', 10);
      const s2 = parseInt(away.score ?? '0', 10);

      // Match our MATCHES entry by ESPN event ID
      const match = MATCHES.find(m => m.espnId === ev.id);
      if (match) {
        // Update team names from ESPN if they are now confirmed
        if (t1) match.t1 = t1;
        if (t2) match.t2 = t2;
        newScores[match.espnId] = { s1, s2, status, clock: clockDisplay };
      }
    });

    SCORES = newScores;
    renderSchedule();
    const hasLive = Object.values(SCORES).some(s => s.status === 'live');
    clearTimeout(liveRefreshTimer);
    if (hasLive) liveRefreshTimer = setTimeout(fetchScores, 60000);
  } catch (e) {}
}

function matchKey(m) { return m.espnId; }

function formatCountdown(ms) {
  const diff = ms - Date.now();
  if (diff <= 0) return 'Starting now';
  const totalMins = Math.floor(diff / 60000);
  const days  = Math.floor(totalMins / 1440);
  const hours = Math.floor((totalMins % 1440) / 60);
  const mins  = totalMins % 60;
  const parts = [];
  if (days)  parts.push(days  + (days  === 1 ? ' day'    : ' days'));
  if (hours) parts.push(hours + (hours === 1 ? ' hour'   : ' hours'));
  if (mins || parts.length === 0) parts.push(mins + (mins === 1 ? ' minute' : ' minutes'));
  return 'Begins in ' + parts.join(' ');
}
function tickCountdowns() {
  document.querySelectorAll('.match-card-countdown[data-ms]').forEach(el => {
    el.textContent = formatCountdown(parseInt(el.dataset.ms, 10));
  });

  const tz = getTz();
  if (tz === 'local') return VENUE_TZ[match.venue] || 'America/New_York';
  return tz;
}

function getLocalDateKey(ms, tz) {
  return new Date(ms).toLocaleDateString('en-AU', { timeZone: tz, year:'numeric', month:'2-digit', day:'2-digit' });
}
function getLocalDateLabel(ms, tz) {
  return new Date(ms).toLocaleDateString('en-AU', {
    timeZone: tz, weekday:'long', day:'numeric', month:'long', year:'numeric'
  });
}
function getTimeStr(ms, tz) {
  return new Date(ms).toLocaleTimeString('en-AU', { timeZone: tz, hour:'numeric', minute:'2-digit', hour12:true });
}

function matchPassesFilters(m) {
  if (currentStage !== 'all' && m.stage !== currentStage) return false;
  if (selectedPeople.size > 0) {
    const p1 = PEOPLE[m.t1], p2 = PEOPLE[m.t2];
    if (!selectedPeople.has(p1) && !selectedPeople.has(p2)) return false;
  }
  return true;
}

function venueCity(venue) {
  // Extract just the city from "Stadium Name, City" format
  const comma = venue.lastIndexOf(',');
  return comma !== -1 ? venue.slice(comma + 1).trim() : venue;
}

function renderSchedule() {
  const tzForGrouping = getTz() === 'local' ? 'America/New_York' : getTz();
  const filtered = MATCHES.filter(matchPassesFilters);

  const byDay = {};
  const dayOrder = [];
  filtered.forEach(m => {
    const key = getLocalDateKey(m.ms, tzForGrouping);
    if (!byDay[key]) { byDay[key] = []; dayOrder.push(key); }
    byDay[key].push(m);
  });

  const seen = new Set();
  const uniqDays = dayOrder.filter(d => { if (seen.has(d)) return false; seen.add(d); return true; });

  let html = '';
  uniqDays.forEach(dayKey => {
    const matches = byDay[dayKey];
    const label = getLocalDateLabel(matches[0].ms, tzForGrouping);
    html += `<div class="day-block"><div class="day-header">${label}</div><div class="matches-grid">`;

    matches.forEach(m => {
      const timeStr = getTimeStr(m.ms, getEffectiveTz(m));
      const isTbd1 = isPlaceholder(m.t1);
      const isTbd2 = isPlaceholder(m.t2);
      const p1 = PEOPLE[m.t1] || '';
      const p2 = PEOPLE[m.t2] || '';
      const p1hl = selectedPeople.size > 0 && selectedPeople.has(p1);
      const p2hl = selectedPeople.size > 0 && selectedPeople.has(p2);
      const sc = SCORES[m.espnId];
      const cardHl = p1hl || p2hl ? ' person-highlight' : '';
      const city = venueCity(m.venue);

      const flag1 = isTbd1 ? '' : (FLAGS[m.t1] || '🏳');
      const flag2 = isTbd2 ? '' : (FLAGS[m.t2] || '🏳');

      let topHtml = '', bottomHtml = '', s1Html = '', s2Html = '', metaHtml = '';

      if (sc && (sc.status === 'live' || sc.status === 'ft')) {
        const isLive = sc.status === 'live';
        let pillLabel;
        if (!isLive) { pillLabel = 'Match Finished'; }
        else if (sc.clock === 'HT') { pillLabel = 'Half Time'; }
        else if (sc.clock) { pillLabel = `Live · ${sc.clock}`; }
        else { pillLabel = 'Live'; }
        const statusClass = isLive ? 'live' : 'ft';
        topHtml = `<div class="match-card-status"><span class="match-status-pill ${statusClass}">${pillLabel}</span></div>`;
        s1Html = `<span class="score-num">${sc.s1}</span>`;
        s2Html = `<span class="score-num">${sc.s2}</span>`;
        metaHtml = `<div class="match-venue">${city}</div>`;
      } else {
        bottomHtml = `<div class="match-card-countdown" data-ms="${m.ms}">${formatCountdown(m.ms)}</div>`;
        metaHtml = `<div class="match-time">${timeStr}</div><div class="match-venue">${city}</div>`;
      }

      html += `<div class="match-card${cardHl}" data-stage="${m.stage}">
        ${topHtml}
        <span class="match-stage-badge badge-${m.stage === 'F' ? 'final' : m.stage.toLowerCase()}">${STAGE_LABELS[m.stage] || m.stage}</span>
        <div class="match-teams">
          <div class="team-row-m">
            <span class="team-flag">${flag1}</span>
            <span class="team-name${isTbd1 ? ' tbd' : ''}">${m.t1}</span>
            <span class="team-person${p1hl ? ' highlighted' : ''}">${p1}</span>
            ${s1Html}
          </div>
          <div class="vs-divider">vs</div>
          <div class="team-row-m">
            <span class="team-flag">${flag2}</span>
            <span class="team-name${isTbd2 ? ' tbd' : ''}">${m.t2}</span>
            <span class="team-person${p2hl ? ' highlighted' : ''}">${p2}</span>
            ${s2Html}
          </div>
        </div>
        <div class="match-meta">${metaHtml}</div>
        ${bottomHtml}
      </div>`;
    });
    html += '</div></div>';
  });

  document.getElementById('schedule').innerHTML = html;
  document.getElementById('noMatches').style.display = filtered.length === 0 ? 'block' : 'none';
}

function filterStage(btn) {
  document.querySelectorAll('#stageFilter button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentStage = btn.dataset.stage;
  renderSchedule();
}

function togglePersonFilter() {
  const panel = document.getElementById('personFilterPanel');
  const toggle = document.getElementById('personFilterToggle');
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  toggle.classList.toggle('open', !isOpen);
}

function collapsePersonFilter() {
  document.getElementById('personFilterPanel').classList.remove('open');
  document.getElementById('personFilterToggle').classList.remove('open');
}

function updateActiveChips() {
  const container = document.getElementById('personActiveChips');
  while (container.firstChild) container.removeChild(container.firstChild);
  selectedPeople.forEach(person => {
    const sourceBtn = document.querySelector('#personFilter button[data-person="' + person + '"]');
    const label = sourceBtn ? sourceBtn.textContent : person;
    const chip = document.createElement('button');
    chip.className = 'active';
    chip.style.cssText = 'padding:5px 12px;border-radius:20px;border:1px solid #111;background:#333;color:#fff;font-size:12px;font-weight:500;cursor:pointer;';
    chip.textContent = label + ' ✕';
    chip.addEventListener('click', () => removePerson(person));
    container.appendChild(chip);
  });
}

function removePerson(person) {
  selectedPeople.delete(person);
  const btn = document.querySelector('#personFilter button[data-person="' + person + '"]');
  if (btn) btn.classList.remove('active');
  if (selectedPeople.size === 0) {
    document.querySelector('#personFilter button[data-person="all"]').classList.add('active');
  }
  updateActiveChips();
  renderSchedule();
}

const ELIM_MESSAGES = [
  { top: "💀 Eliminated!", body: "Your team is out. It turns out you're not very good at this World Cup thing. Better luck in 2030!" },
  { top: "🚫 Pack your bags!", body: "That team went home early. Turns out picking a winner is harder than it looks. No refunds." },
  { top: "✈️ Gone home!", body: "Your team has left the building. The World Cup will continue without them — and without your glory." },
  { top: "🪑 Bench warmer!", body: "Your team got knocked out. You can still watch the rest of the tournament, just not with any hope." },
  { top: "😬 Ouch!", body: "Your team didn't make it past the group stage. The dream is over. The snacks are not." },
  { top: "🗑️ Eliminated!", body: "Your team has been sent packing. Maybe next time pick a team that actually scores goals?" },
];

let elimToastTimer = null;
function showElimToast() {
  const msg = ELIM_MESSAGES[Math.floor(Date.now() / 1000) % ELIM_MESSAGES.length];
  document.getElementById('elimToastTop').textContent = msg.top;
  document.getElementById('elimToastBody').textContent = msg.body;
  document.getElementById('elimToast').classList.add('show');
  document.getElementById('elimOverlay').classList.add('show');
  clearTimeout(elimToastTimer);
  elimToastTimer = setTimeout(hideElimToast, 6000);
}
function hideElimToast() {
  clearTimeout(elimToastTimer);
  document.getElementById('elimToast').classList.remove('show');
  document.getElementById('elimOverlay').classList.remove('show');
}

function filterPerson(btn) {
  const person = btn.dataset.person;
  if (person === 'all') {
    selectedPeople.clear();
    document.querySelectorAll('#personFilter button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateActiveChips();
    collapsePersonFilter();
  } else {
    if (btn.classList.contains('eliminated')) {
      showElimToast();
      collapsePersonFilter();
      return;
    }
    document.querySelector('#personFilter button[data-person="all"]').classList.remove('active');
    if (selectedPeople.has(person)) {
      selectedPeople.delete(person);
      btn.classList.remove('active');
    } else {
      selectedPeople.add(person);
      btn.classList.add('active');
    }
    if (selectedPeople.size === 0) {
      document.querySelector('#personFilter button[data-person="all"]').classList.add('active');
    }
    updateActiveChips();
    collapsePersonFilter();
  }
  renderSchedule();
}

const savedTz = localStorage.getItem('wc26tz');
if (savedTz) { const sel = document.getElementById('tzSelect'); if ([...sel.options].some(o => o.value === savedTz)) sel.value = savedTz; }
renderSchedule();
fetchScores();
fetchStandings();
</script>
