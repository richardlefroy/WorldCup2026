<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 — Bracket</title>
<link rel="stylesheet" href="style.css">
<style>
.bracket-page {
  padding: 1.25rem 1rem 3rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}
#bracket-svg-wrap {
  width: 100%;
  max-width: 720px;
  aspect-ratio: 1;
}
#bracket-svg {
  width: 100%;
  height: 100%;
  display: block;
  overflow: visible;
}
.b-line      { fill: none; stroke: #999; stroke-width: 1.5; }
.b-line.won  { stroke: #999; stroke-width: 1.5; }
.b-line.live { stroke: #22c55e; stroke-width: 1.5; }
.b-label {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 8.5px;
  font-weight: 600;
  letter-spacing: 0.4px;
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
  fill: #bbb;
}
.b-label.won     { fill: #333; }
.b-label.active  { fill: #333; }
.b-label.elim    { fill: #999; }
.b-label-person  { fill: #666; font-weight: 700; font-size: 9.5px; }
#b-tip {
  position: fixed;
  background: #111;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 5px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.12s;
  z-index: 300;
  white-space: nowrap;
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>⚽ World Cup '26</h1>
  </div>
  <div class="header-right">
    <a href="groupstage.html" class="nav-link">Group Stage</a>
    <a href="index.html" class="nav-link">Knockout</a>
    <a href="groups.html" class="nav-link">Groups</a>
    <a href="bracket.html" class="nav-link active">Bracket</a>
  </div>
</header>

<div class="bracket-page">
  <div id="bracket-svg-wrap">
    <svg id="bracket-svg" viewBox="-360 -360 720 720"></svg>
  </div>
</div>

<div id="b-tip"></div>

<script>
'use strict';

// =============================================================================
// SLOT ORDER  (clockwise from just past 12 o'clock)
//
// Slots are paired: match i uses slots i*2 and i*2+1.
// Adjacent matches feed a shared R16 node.
//
// match 0  slots  0, 1  Brazil        vs Japan
// match 1  slots  2, 3  Ivory Coast   vs Norway
// match 2  slots  4, 5  Mexico        vs Ecuador
// match 3  slots  6, 7  England       vs DR Congo
// match 4  slots  8, 9  Argentina     vs Cabo Verde
// match 5  slots 10,11  Australia     vs Egypt
// match 6  slots 12,13  Switzerland   vs Algeria
// match 7  slots 14,15  Colombia      vs Ghana
// match 8  slots 16,17  Belgium       vs Senegal
// match 9  slots 18,19  USA           vs Bosnia
// match 10 slots 20,21  Spain         vs Austria
// match 11 slots 22,23  Portugal      vs Croatia
// match 12 slots 24,25  Netherlands   vs Morocco
// match 13 slots 26,27  South Africa  vs Canada
// match 14 slots 28,29  France        vs Sweden
// match 15 slots 30,31  Germany       vs Paraguay
//
// R16 pairs  (match winners feed next ring node):
//   R16[0]  winner m0  vs winner m1   (Brazil/Japan  vs  CIV/Norway)
//   R16[1]  winner m2  vs winner m3   (Mexico/Ecuador vs England/Congo)
//   R16[2]  winner m4  vs winner m5   (Argentina/CV  vs Australia/Egypt)
//   R16[3]  winner m6  vs winner m7   (Swi/Alg       vs Col/Ghana)
//   R16[4]  winner m8  vs winner m9   (Bel/Sen        vs USA/Bosnia)
//   R16[5]  winner m10 vs winner m11  (Spain/Aut      vs Por/Cro)
//   R16[6]  winner m12 vs winner m13  (Ned/Mar        vs RSA/Can)
//   R16[7]  winner m14 vs winner m15  (Fra/Swe        vs Ger/Par)
//
// QF pairs:
//   QF[0]  R16[0] vs R16[1]
//   QF[1]  R16[2] vs R16[3]
//   QF[2]  R16[4] vs R16[5]
//   QF[3]  R16[6] vs R16[7]
//
// SF pairs:
//   SF[0]  QF[0] vs QF[1]
//   SF[1]  QF[2] vs QF[3]
// =============================================================================

// ESPN match IDs — keyed to the slot order above
var R32 = [
  '760487', // 0  Brazil vs Japan
  '760490', // 1  Ivory Coast vs Norway
  '760491', // 2  Mexico vs Ecuador
  '760495', // 3  England vs DR Congo
  '760500', // 4  Argentina vs Cabo Verde
  '760499', // 5  Australia vs Egypt
  '760498', // 6  Switzerland vs Algeria
  '760501', // 7  Colombia vs Ghana
  '760493', // 8  Belgium vs Senegal
  '760494', // 9  USA vs Bosnia
  '760497', // 10 Spain vs Austria
  '760496', // 11 Portugal vs Croatia
  '760488', // 12 Netherlands vs Morocco
  '760486', // 13 South Africa vs Canada
  '760492', // 14 France vs Sweden
  '760489', // 15 Germany vs Paraguay
];

var R16 = [
  '760503', // 0  winner R32[0] vs winner R32[1]
  '760504', // 1  winner R32[2] vs winner R32[3]
  '760505', // 2  winner R32[4] vs winner R32[5]
  '760509', // 3  winner R32[6] vs winner R32[7]
  '760506', // 4  winner R32[8] vs winner R32[9]
  '760507', // 5  winner R32[10] vs winner R32[11]
  '760508', // 6  winner R32[12] vs winner R32[13]
  '760502', // 7  winner R32[14] vs winner R32[15]
];

var QF = [
  '760510', // 0  R16[0] vs R16[1]
  '760511', // 1  R16[2] vs R16[3]
  '760512', // 2  R16[4] vs R16[5]
  '760513', // 3  R16[6] vs R16[7]
];

var SF = [
  '760514', // 0  QF[0] vs QF[1]
  '760515', // 1  QF[2] vs QF[3]
];

var FINAL_ID = '760517';

// =============================================================================
// GEOMETRY
//
// 32 slots, 11.25° each, clockwise from top.
// Slot 0 starts at the top (0°) so Brazil is just clockwise of 12 o'clock.
//
// slotAngle(s)  = s * 11.25°          (slot centre)
// joinAngle(i)  = midpoint of slots i*2 and i*2+1  = (i*2 + 0.5) * 11.25°
// All inner ring angles derive by averaging their feeder angles.
// =============================================================================

var SLOT_DEG = 360 / 32; // 11.25°

function slotAngle(s) {
  return s * SLOT_DEG + 5.625;
}

function joinAngle(i) {
  return (slotAngle(i * 2) + slotAngle(i * 2 + 1)) / 2;
}

function r16Angle(i) {
  return (joinAngle(i * 2) + joinAngle(i * 2 + 1)) / 2;
}

function qfAngle(i) {
  return (r16Angle(i * 2) + r16Angle(i * 2 + 1)) / 2;
}

function sfAngle(i) {
  return (qfAngle(i * 2) + qfAngle(i * 2 + 1)) / 2;
}

function finAngle(i) {
  return (sfAngle(i * 2) + sfAngle(i * 2 + 1)) / 2;
}

// polar: degrees clockwise from top → {x, y}
function polar(deg, r) {
  var rad = (deg - 90) * Math.PI / 180;
  return { x: r * Math.cos(rad), y: r * Math.sin(rad) };
}

var RADII = { r32: 300, join: 240, r16: 185, qf: 130, sf: 82, fin: 44 };
var NR    = { r32: 19,  join: 16,  r16: 14,  qf: 13,  sf: 13, fin: 16 };

// =============================================================================
// TEAM DATA
// =============================================================================

var ESPN_NORM = {
  'United States':       'USA',
  'Ivory Coast':         'CIV',
  "Cote d'Ivoire":       'CIV',
  'Bosnia-Herzegovina':  'BIH',
  'Cape Verde':          'CPV',
  'Cabo Verde':          'CPV',
  'Congo DR':            'COD',
  'DR Congo':            'COD',
};

function normName(n) {
  return ESPN_NORM[n] || n;
}

var FLAG_ISO = {
  'Argentina':'ar',   'Brazil':'br',       'Colombia':'co',    'Ecuador':'ec',
  'Paraguay':'py',    'USA':'us',           'Mexico':'mx',      'Canada':'ca',
  'France':'fr',      'Spain':'es',         'Portugal':'pt',    'Germany':'de',
  'Netherlands':'nl', 'England':'gb-eng',   'Belgium':'be',     'Austria':'at',
  'Croatia':'hr',     'Switzerland':'ch',   'Sweden':'se',      'Norway':'no',
  'Morocco':'ma',     'Senegal':'sn',       'CIV':'ci',         'Egypt':'eg',
  'Algeria':'dz',     'Ghana':'gh',         'Japan':'jp',       'Australia':'au',
  'BIH':'ba',         'CPV':'cv',           'COD':'cd',         'South Africa':'za',
  'South Korea':'kr', 'KOR':'kr',
};

function flagUrl(name) {
  var key = normName(name);
  var iso = FLAG_ISO[key] || FLAG_ISO[name];
  return iso ? 'https://flagcdn.com/w80/' + iso + '.png' : null;
}

var SHORT = {
  'Argentina':'ARG',    'Brazil':'BRA',       'Colombia':'COL',   'Ecuador':'ECU',
  'Paraguay':'PAR',     'USA':'USA',           'Mexico':'MEX',     'Canada':'CAN',
  'France':'FRA',       'Spain':'ESP',         'Portugal':'POR',   'Germany':'GER',
  'Netherlands':'NED',  'England':'ENG',       'Belgium':'BEL',    'Austria':'AUT',
  'Croatia':'CRO',      'Switzerland':'SUI',   'Sweden':'SWE',     'Norway':'NOR',
  'Morocco':'MAR',      'Senegal':'SEN',       'CIV':'CIV',        'Egypt':'EGY',
  'Algeria':'ALG',      'Ghana':'GHA',         'Japan':'JPN',      'Australia':'AUS',
  'BIH':'BIH',          'CPV':'CPV',           'COD':'COD',        'South Africa':'RSA',
  'South Korea':'KOR',  'KOR':'KOR',
  'United States':'USA','Ivory Coast':'CIV',   "Cote d'Ivoire":'CIV',
  'Bosnia-Herzegovina':'BIH', 'Cape Verde':'CPV', 'Cabo Verde':'CPV',
  'Congo DR':'COD',     'DR Congo':'COD',
};

function shortName(name) {
  if (!name) return '?';
  var key = normName(name);
  return SHORT[key] || SHORT[name] || name.slice(0, 3).toUpperCase();
}

var PEOPLE = {
  'Brazil':'Joy',         'Japan':'Francesca',    'CIV':'Olive E',      'Norway':'Tessa',
  'Mexico':'Katy',        'Ecuador':'Nic T',      'England':'Lily',     'COD':'JoyJoy',
  'Argentina':'Louis',    'CPV':'Leah',            'Australia':'Rosa',   'Egypt':'Susan',
  'Switzerland':'Renate', 'Algeria':'Tenille',    'Colombia':'Sal Edmonds', 'Ghana':'Alex L',
  'Belgium':'Lucy',       'Senegal':'James A',    'USA':'Sarah',        'BIH':'Finn',
  'Spain':'Georgette',    'Austria':'Elliot',     'Portugal':'Mike S',  'Croatia':'Mila',
  'Netherlands':'Sophie', 'Morocco':'Matty',      'South Africa':'Rod', 'Canada':'Ted',
  'France':'Taki',        'Sweden':'Ewen',        'Germany':'Ben',      'Paraguay':'Olive P',
  // alternate spellings
  'Ivory Coast':'Olive E',  "Cote d'Ivoire":'Olive E',
  'Cape Verde':'Leah',      'Cabo Verde':'Leah',
  'DR Congo':'JoyJoy',      'Congo DR':'JoyJoy',
  'Bosnia-Herzegovina':'Finn',
};

function personFor(name) {
  if (!name) return null;
  var key = normName(name);
  return PEOPLE[key] || PEOPLE[name] || null;
}

// =============================================================================
// SCORE DATA
// =============================================================================

var SCORES = {};

function isPlaceholder(n) {
  return !n || n === 'TBD' || /^(Group|Round of|Quarter|Semi|Third|Winner|Loser)/i.test(n);
}

function getScore(id) { return SCORES[id] || null; }

function getWinner(id) {
  var s = SCORES[id];
  if (!s || s.status !== 'ft') return null;
  if (s.winner === 1) return s.t1;
  if (s.winner === 2) return s.t2;
  return null;
}

// =============================================================================
// SVG HELPERS
// =============================================================================

var NS  = 'http://www.w3.org/2000/svg';
var svg = document.getElementById('bracket-svg');
var _clipId = 0;

function svgEl(tag, attrs) {
  var e = document.createElementNS(NS, tag);
  var keys = Object.keys(attrs || {});
  for (var k = 0; k < keys.length; k++) e.setAttribute(keys[k], attrs[keys[k]]);
  return e;
}

function seg(x1, y1, x2, y2, cls) {
  var l = svgEl('line', { x1: x1, y1: y1, x2: x2, y2: y2 });
  l.classList.add('b-line');
  if (cls) l.classList.add(cls);
  return l;
}

function makeNode(x, y, r, teamName, scoreId, eliminated) {
  var g = svgEl('g');
  if (!teamName) {
    var emp = svgEl('circle', { cx: x, cy: y, r: r, fill: '#e8e5e0', stroke: '#bbb', 'stroke-width': 1.2 });
    g.appendChild(emp);
    var qt = svgEl('text', { x: x, y: y, 'text-anchor': 'middle', 'dominant-baseline': 'central',
      'font-size': Math.round(r * 0.65), fill: '#ccc',
      'font-family': "-apple-system, sans-serif", 'pointer-events': 'none' });
    qt.textContent = '?';
    g.appendChild(qt);
    return g;
  }

  var dim  = !!eliminated;
  var s    = scoreId ? getScore(scoreId) : null;
  var live = s && s.status === 'live';
  var url  = flagUrl(teamName);

  if (url) {
    var cid = 'cp' + (++_clipId);
    var defsEl = svg.querySelector('defs');
    var cp = svgEl('clipPath', { id: cid });
    cp.appendChild(svgEl('circle', { cx: x, cy: y, r: r }));
    defsEl.appendChild(cp);

    var imgW = r * 3, imgH = r * 2;
    var img = svgEl('image', {
      x: x - imgW / 2, y: y - imgH / 2,
      width: imgW, height: imgH,
      href: url,
      'clip-path': 'url(#' + cid + ')',
      preserveAspectRatio: 'xMidYMid slice',
      'pointer-events': 'all',
    });
    if (dim) img.setAttribute('filter', 'url(#greyscale)');
    if (scoreId) {
      (function(eid, tn) {
        img.addEventListener('mouseenter', function(e) { showTip(e, tn, eid); });
        img.addEventListener('mousemove', moveTip);
        img.addEventListener('mouseleave', hideTip);
      }(scoreId, teamName));
    }
    g.appendChild(img);



  } else {
    var disc = svgEl('circle', { cx: x, cy: y, r: r,
      fill: dim ? '#e8e5e0' : '#fff' });
    if (scoreId) {
      (function(eid, tn) {
        disc.addEventListener('mouseenter', function(e) { showTip(e, tn, eid); });
        disc.addEventListener('mousemove', moveTip);
        disc.addEventListener('mouseleave', hideTip);
      }(scoreId, teamName));
    }
    g.appendChild(disc);
    var code = svgEl('text', { x: x, y: y, 'text-anchor': 'middle', 'dominant-baseline': 'central',
      'font-size': Math.round(r * 0.55), fill: dim ? '#bbb' : '#555',
      'font-family': "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif",
      'font-weight': 600, 'pointer-events': 'none' });
    code.textContent = shortName(teamName);
    g.appendChild(code);
  }

  return g;
}

// Label pushed outward from node in the direction of angleDeg
function makeLabel(x, y, angleDeg, text, nodeR, cls, person) {
  var push = nodeR + 24;
  var rad  = (angleDeg - 90) * Math.PI / 180;
  var lx   = x + Math.cos(rad) * push;
  var ly   = y + Math.sin(rad) * push;

  if (person) {
    var g = svgEl('g');
    var t1 = svgEl('text', { x: lx, y: ly - 5 });
    t1.classList.add('b-label', 'b-label-person');
    if (cls) t1.classList.add(cls);
    t1.textContent = person;
    g.appendChild(t1);
    var t2 = svgEl('text', { x: lx, y: ly + 5 });
    t2.classList.add('b-label');
    if (cls) t2.classList.add(cls);
    t2.textContent = text;
    g.appendChild(t2);
    return g;
  }

  var t = svgEl('text', { x: lx, y: ly });
  t.classList.add('b-label');
  if (cls) t.classList.add(cls);
  t.textContent = text;
  return t;
}

// =============================================================================
// BUILD
// =============================================================================

function build() {
  while (svg.lastChild) svg.removeChild(svg.lastChild);

  // Defs
  var defs = svgEl('defs');
  var rg = svgEl('radialGradient', { id: 'cg', cx: '50%', cy: '50%', r: '50%' });
  [['0%','#f7c948','0.14'], ['40%','#f7c948','0.04'], ['100%','#f2f1ed','0']].forEach(function(s) {
    rg.appendChild(svgEl('stop', { offset: s[0], 'stop-color': s[1], 'stop-opacity': s[2] }));
  });
  defs.appendChild(rg);
  // Greyscale filter for eliminated teams
  var flt = svgEl('filter', { id: 'greyscale' });
  flt.appendChild(svgEl('feColorMatrix', { type: 'saturate', values: '0' }));
  defs.appendChild(flt);
  svg.appendChild(defs);

  // Background
  svg.appendChild(svgEl('circle', { cx: 0, cy: 0, r: 360, fill: '#f2f1ed' }));
  svg.appendChild(svgEl('circle', { cx: 0, cy: 0, r: 160, fill: 'url(#cg)' }));
  // Draw arcs only between paired nodes at each ring radius
  function arc(r, startDeg, endDeg) {
    var s = (startDeg - 90) * Math.PI / 180;
    var e = (endDeg   - 90) * Math.PI / 180;
    var x1 = r * Math.cos(s), y1 = r * Math.sin(s);
    var x2 = r * Math.cos(e), y2 = r * Math.sin(e);
    var span = ((endDeg - startDeg) + 360) % 360;
    var large = span > 180 ? 1 : 0;
    var el = svgEl('path', {
      d: 'M ' + x1 + ' ' + y1 + ' A ' + r + ' ' + r + ' 0 ' + large + ' 1 ' + x2 + ' ' + y2,
      fill: 'none', stroke: '#999', 'stroke-width': 1.5,
    });
    svg.appendChild(el);
  }

  // R32 ring: arc between each pair of team slots (match i = slots i*2 and i*2+1)
  for (var ai = 0; ai < 16; ai++) {
    arc(RADII.r32, slotAngle(ai * 2), slotAngle(ai * 2 + 1));
  }

  // R16 ring: arc between the two join nodes that feed each R16 match
  // R16 match i is fed by join nodes i*2 and i*2+1
  for (var ai2 = 0; ai2 < 8; ai2++) {
    arc(RADII.join, joinAngle(ai2 * 2), joinAngle(ai2 * 2 + 1));
  }

  // QF ring: arc between the two R16 nodes that feed each QF match
  // QF match i is fed by R16 nodes i*2 and i*2+1
  for (var ai3 = 0; ai3 < 4; ai3++) {
    arc(RADII.r16, r16Angle(ai3 * 2), r16Angle(ai3 * 2 + 1));
  }

  // SF ring: arc between the two QF nodes that feed each SF match
  // SF match i is fed by QF nodes i*2 and i*2+1
  for (var ai4 = 0; ai4 < 2; ai4++) {
    arc(RADII.qf, qfAngle(ai4 * 2), qfAngle(ai4 * 2 + 1));
  }

  // Final ring: arc between the two SF nodes
  arc(RADII.sf, sfAngle(0), sfAngle(1));

  var linesG = svgEl('g');
  var nodesG = svgEl('g');

  // ── Pre-compute all node positions ──

  // R32 outer ring: 32 individual team nodes
  var r32 = [], r32ang = [];
  for (var s = 0; s < 32; s++) {
    var a = slotAngle(s);
    r32.push(polar(a, RADII.r32));
    r32ang.push(a);
  }

  // Join ring: 16 nodes, one per R32 match, between the two team slots
  var joinP = [], joinA = [];
  for (var ji = 0; ji < 16; ji++) {
    var ja = joinAngle(ji);
    joinP.push(polar(ja, RADII.join));
    joinA.push(ja);
  }

  // R16 ring: 8 nodes, one per R16 match
  var r16P = [], r16A = [];
  for (var ri = 0; ri < 8; ri++) {
    var ra = r16Angle(ri);
    r16P.push(polar(ra, RADII.r16));
    r16A.push(ra);
  }

  // QF ring: 4 nodes
  var qfP = [], qfA = [];
  for (var qi = 0; qi < 4; qi++) {
    var qa = qfAngle(qi);
    qfP.push(polar(qa, RADII.qf));
    qfA.push(qa);
  }

  // SF ring: 2 nodes
  var sfP = [], sfA = [];
  for (var si = 0; si < 2; si++) {
    var sa = sfAngle(si);
    sfP.push(polar(sa, RADII.sf));
    sfA.push(sa);
  }

  var finWin = getWinner(FINAL_ID);
  var finSc  = getScore(FINAL_ID);

  // ── Lines: arc midpoint on R32 ring → join nodes ──
  for (var mi = 0; mi < 16; mi++) {
    var sc  = getScore(R32[mi]);
    var w   = getWinner(R32[mi]);
    var liv = sc && sc.status === 'live';
    var midR32 = polar(joinAngle(mi), RADII.r32);
    linesG.appendChild(seg(midR32.x, midR32.y, joinP[mi].x, joinP[mi].y,
      liv ? 'live' : (w ? 'won' : '')));
  }

  // ── Lines: arc midpoint on join ring → R16 nodes ──
  // One line per R16 match, originating from the midpoint of the arc between the two feeder join nodes.
  for (var ji2 = 0; ji2 < 8; ji2++) {
    var r16sc  = getScore(R16[ji2]);
    var r16w   = getWinner(R16[ji2]);
    var r16liv = r16sc && r16sc.status === 'live';
    var midPt  = polar(r16Angle(ji2), RADII.join);
    linesG.appendChild(seg(midPt.x, midPt.y, r16P[ji2].x, r16P[ji2].y,
      r16liv ? 'live' : (r16w ? 'won' : '')));
  }

  // ── Lines: arc midpoint on R16 ring → QF nodes ──
  for (var qi2 = 0; qi2 < 4; qi2++) {
    var qfsc  = getScore(QF[qi2]);
    var qfw2  = getWinner(QF[qi2]);
    var qfliv = qfsc && qfsc.status === 'live';
    var midPt2 = polar(qfAngle(qi2), RADII.r16);
    linesG.appendChild(seg(midPt2.x, midPt2.y, qfP[qi2].x, qfP[qi2].y,
      qfliv ? 'live' : (qfw2 ? 'won' : '')));
  }

  // ── Lines: arc midpoint on QF ring → SF nodes ──
  for (var si2 = 0; si2 < 2; si2++) {
    var sfsc  = getScore(SF[si2]);
    var sfw2  = getWinner(SF[si2]);
    var sfliv = sfsc && sfsc.status === 'live';
    var midPt3 = polar(sfAngle(si2), RADII.qf);
    linesG.appendChild(seg(midPt3.x, midPt3.y, sfP[si2].x, sfP[si2].y,
      sfliv ? 'live' : (sfw2 ? 'won' : '')));
  }

  // ── Lines: arc midpoint on SF ring → centre ──
  var finsc2  = getScore(FINAL_ID);
  var finw2   = getWinner(FINAL_ID);
  var finliv2 = finsc2 && finsc2.status === 'live';
  var finMid  = polar((sfAngle(0) + sfAngle(1)) / 2, RADII.sf);
  linesG.appendChild(seg(finMid.x, finMid.y, 0, 0,
    finliv2 ? 'live' : (finw2 ? 'won' : '')));

  // ── Draw R32 team nodes ──
  for (var mi2 = 0; mi2 < 16; mi2++) {
    var sid  = R32[mi2];
    var sc2  = getScore(sid);
    var t1   = sc2 && !isPlaceholder(sc2.t1) ? sc2.t1 : null;
    var t2   = sc2 && !isPlaceholder(sc2.t2) ? sc2.t2 : null;
    var w2   = getWinner(sid);
    var sA   = mi2 * 2;
    var sB   = mi2 * 2 + 1;
    nodesG.appendChild(makeNode(r32[sA].x, r32[sA].y, NR.r32, t1, sid, w2 && t1 && w2 !== t1));
    nodesG.appendChild(makeNode(r32[sB].x, r32[sB].y, NR.r32, t2, sid, w2 && t2 && w2 !== t2));
    nodesG.appendChild(makeLabel(r32[sA].x, r32[sA].y, r32ang[sA],
      shortName(t1), NR.r32, w2 && w2 !== t1 ? 'elim' : (w2 === t1 ? 'won' : (t1 ? 'active' : '')), personFor(t1)));
    nodesG.appendChild(makeLabel(r32[sB].x, r32[sB].y, r32ang[sB],
      shortName(t2), NR.r32, w2 && w2 !== t2 ? 'elim' : (w2 === t2 ? 'won' : (t2 ? 'active' : '')), personFor(t2)));
  }

  // ── Draw join nodes (show R32 winner) — no labels on inner rings ──
  for (var ji3 = 0; ji3 < 16; ji3++) {
    var jwin = getWinner(R32[ji3]);
    nodesG.appendChild(makeNode(joinP[ji3].x, joinP[ji3].y, NR.join, jwin, R32[ji3], false));
  }

  // ── Draw R16 nodes ──
  for (var ri3 = 0; ri3 < 8; ri3++) {
    var r16w = getWinner(R16[ri3]);
    nodesG.appendChild(makeNode(r16P[ri3].x, r16P[ri3].y, NR.r16, r16w, R16[ri3], false));
  }

  // ── Draw QF nodes ──
  for (var qi3 = 0; qi3 < 4; qi3++) {
    var qfw = getWinner(QF[qi3]);
    nodesG.appendChild(makeNode(qfP[qi3].x, qfP[qi3].y, NR.qf, qfw, QF[qi3], false));
  }

  // ── Draw SF nodes ──
  for (var si3 = 0; si3 < 2; si3++) {
    var sfw = getWinner(SF[si3]);
    nodesG.appendChild(makeNode(sfP[si3].x, sfP[si3].y, NR.sf, sfw, SF[si3], false));
  }

  svg.appendChild(linesG);
  svg.appendChild(nodesG);

  // ── Centre node (final) — always exactly at (0,0) ──
  var cg = svgEl('g');
  var centreR = 26;
  if (finWin) {
    nodesG.appendChild(makeNode(0, 0, centreR, finWin, FINAL_ID, false));
    var ct = svgEl('text', { x: 0, y: centreR + 12, 'text-anchor': 'middle',
      'font-family': "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif",
      'font-size': 9, 'font-weight': 700, 'letter-spacing': 1, fill: '#b89010', 'pointer-events': 'none' });
    ct.textContent = shortName(finWin).toUpperCase();
    cg.appendChild(ct);
  } else {
    cg.appendChild(svgEl('circle', { cx: 0, cy: 0, r: centreR,
      fill: '#e8e5e0', stroke: '#bbb', 'stroke-width': 1.5 }));
    var qt2 = svgEl('text', { x: 0, y: 0, 'text-anchor': 'middle', 'dominant-baseline': 'central',
      'font-size': Math.round(centreR * 0.65), fill: '#ccc',
      'font-family': "-apple-system, sans-serif", 'pointer-events': 'none' });
    qt2.textContent = '?';
    cg.appendChild(qt2);
  }
  svg.appendChild(cg);
}

// =============================================================================
// TOOLTIP
// =============================================================================

var tip = document.getElementById('b-tip');

function showTip(e, teamName, espnId) {
  var s = SCORES[espnId];
  var text = teamName;
  if (s && (s.status === 'live' || s.status === 'ft') && s.t1 && s.t2) {
    var other  = s.t1 === teamName ? s.t2 : s.t1;
    var myS    = s.t1 === teamName ? s.s1 : s.s2;
    var theirS = s.t1 === teamName ? s.s2 : s.s1;
    var lbl    = s.status === 'live' ? (s.clock || 'Live') : 'FT';
    text = teamName + '  ' + myS + '–' + theirS + '  ' + other + '  (' + lbl + ')';
    if (s.pen) text += '  — ' + s.pen;
  } else if (s && s.t1 && s.t2 && !isPlaceholder(s.t2)) {
    text = teamName + ' vs ' + (s.t1 === teamName ? s.t2 : s.t1);
  }
  tip.textContent = text;
  tip.style.opacity = '1';
  moveTip(e);
}
function moveTip(e) {
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top  = (e.clientY - 30) + 'px';
}
function hideTip() { tip.style.opacity = '0'; }

// =============================================================================
// ESPN FETCH
// =============================================================================

var liveTimer = null;

function fetchScores() {
  var url = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260628-20260719&limit=100';
  fetch(url).then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }).then(function(data) {
    var hasLive = false;
    var events = data.events || [];
    for (var ei = 0; ei < events.length; ei++) {
      var ev   = events[ei];
      var comp = ev.competitions && ev.competitions[0];
      if (!comp) continue;
      var teams = comp.competitors || [];
      if (teams.length < 2) continue;

      var home = null, away = null;
      for (var ti = 0; ti < teams.length; ti++) {
        if (teams[ti].homeAway === 'home') home = teams[ti];
        else away = teams[ti];
      }
      if (!home) home = teams[0];
      if (!away) away = teams[1];

      var t1raw = (home.team && home.team.displayName) || '';
      var t2raw = (away.team && away.team.displayName) || '';
      var t1 = isPlaceholder(t1raw) ? null : t1raw;
      var t2 = isPlaceholder(t2raw) ? null : t2raw;

      var sType  = (ev.status && ev.status.type && ev.status.type.name) || '';
      var rawClk = (ev.status && ev.status.displayClock) || '';
      var period = (ev.status && ev.status.period) || 0;

      var status = 'pre';
      if (sType === 'STATUS_FINAL' || sType === 'STATUS_FULL_TIME' || sType === 'STATUS_FINAL_PEN') {
        status = 'ft';
      } else if (sType === 'STATUS_IN_PROGRESS' || sType === 'STATUS_HALFTIME') {
        status = 'live';
      }
      if (status === 'live') hasLive = true;

      var clockDisp = '';
      if (status === 'live') {
        if (sType === 'STATUS_HALFTIME') {
          clockDisp = 'HT';
        } else {
          var mins = parseInt(rawClk.split(':')[0], 10) || 0;
          var cap  = period === 1 ? 45 : 90;
          clockDisp = mins > cap ? cap + '+' + (mins - cap) + "'" : mins + "'";
        }
      }
      if (sType === 'STATUS_FINAL_PEN') clockDisp = 'Pens';

      var s1 = parseInt(home.score != null ? home.score : '0', 10);
      var s2 = parseInt(away.score != null ? away.score : '0', 10);

      var w = null;
      if (status === 'ft') {
        if (home.winner === true) w = 1;
        else if (away.winner === true) w = 2;
        else if (s1 > s2) w = 1;
        else if (s2 > s1) w = 2;
      }

      var pen = null;
      var notes = comp.notes || [];
      if (notes.length) pen = notes[0].headline || notes[0].text || null;

      SCORES[ev.id] = { t1: t1, t2: t2, s1: s1, s2: s2, status: status, clock: clockDisp, winner: w, pen: pen };
    }

    build();
    clearTimeout(liveTimer);
    if (hasLive) liveTimer = setTimeout(fetchScores, 60000);
  }).catch(function() {
    // scores unavailable — static bracket still renders
  });
}

// =============================================================================
// INIT
// =============================================================================
build();
fetchScores();
</script>
